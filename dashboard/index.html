<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIoT Dashboard – Prédiction du trafic</title>
    <meta name="description" content="Prédiction du trafic routier en temps réel avec IA – Interface IoT professionnelle.">

    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* (Le style reste strictement le même que celui fourni initialement) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --theme-color: #b00000;
            --theme-dark: #7a0000;
            --theme-soft: rgba(176, 0, 0, 0.08);
            --text-primary: #1e2a3e;
            --text-secondary: #2c3e50;
            --bg-gradient-start: #fef9f5;
            --bg-gradient-end: #fff5ef;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            --border-light: #ffe3db;
            --input-bg: #f5f7fa;
            --input-border: #e9edf2;
        }

        [data-theme="blue"] {
            --theme-color: #0b3b6a;
            --theme-dark: #062d50;
            --theme-soft: rgba(11, 59, 106, 0.08);
            --bg-gradient-start: #f0f6fe;
            --bg-gradient-end: #e9f0fa;
            --border-light: #cde3f5;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .dashboard-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.12);
        }

        .logo-icon {
            font-size: 3.5rem;
            color: var(--theme-color);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--theme-color);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .input-group {
            background: var(--input-bg);
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--input-border);
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--theme-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(176, 0, 0, 0.1);
        }
        [data-theme="blue"] .input-group:focus-within {
            box-shadow: 0 0 0 3px rgba(11, 59, 106, 0.2);
        }

        .input-group i {
            color: var(--theme-color);
            font-size: 1.2rem;
        }

        .input-group input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 1rem;
            padding: 14px 0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text-primary);
        }

        .input-group input::placeholder {
            color: #9aa6b5;
            font-weight: 400;
        }

        .btn-predict {
            width: 100%;
            background: var(--theme-color);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .btn-predict:hover {
            background: var(--theme-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.15);
        }

        .btn-predict:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            background: var(--theme-soft);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .result-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .result-status {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            width: 52px;
            height: 52px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            border: none;
            font-size: 1.4rem;
            color: var(--theme-color);
            z-index: 1100;
            transition: 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            background: white;
        }

        @media (max-width: 550px) {
            .dashboard-card {
                padding: 28px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .logo-icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="logo-icon">
            <i class="fa-solid fa-traffic-light"></i>
        </div>
        <h1>AIoT Traffic Predictor</h1>
        <p class="subtitle">Prédiction du trafic routier en temps réel</p>

        <div class="input-group">
            <i class="fa-solid fa-car"></i>
            <input type="number" id="trafic" placeholder="Entrez la valeur du trafic" step="1" required>
        </div>

        <button class="btn-predict" id="predictBtn">
            <i class="fa-solid fa-microchip"></i> Prédire
        </button>

        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-status" id="resultStatus"></div>
        </div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème">
        <i class="fa-solid fa-palette"></i>
    </button>

    <script>
        // Thème dynamique
        const savedTheme = localStorage.getItem("appdev_theme") || "red";
        document.documentElement.setAttribute("data-theme", savedTheme);

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            const newTheme = current === "red" ? "blue" : "red";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("appdev_theme", newTheme);
        }

        document.getElementById("themeToggle").addEventListener("click", toggleTheme);

        // Prédiction
        const predictBtn = document.getElementById("predictBtn");
        const traficInput = document.getElementById("trafic");
        const resultContainer = document.getElementById("resultContainer");
        const resultIcon = document.getElementById("resultIcon");
        const resultText = document.getElementById("resultText");
        const resultStatus = document.getElementById("resultStatus");

        function setLoading(isLoading) {
            if (isLoading) {
                predictBtn.disabled = true;
                predictBtn.innerHTML = '<span class="loader"></span> Prédiction en cours...';
            } else {
                predictBtn.disabled = false;
                predictBtn.innerHTML = '<i class="fa-solid fa-microchip"></i> Prédire';
            }
        }

        async function predictTraffic() {
            const value = traficInput.value.trim();
            if (!value) {
                alert("Veuillez entrer une valeur de trafic.");
                return;
            }

            const trafic = parseInt(value);
            if (isNaN(trafic)) {
                alert("Veuillez entrer un nombre valide.");
                return;
            }

            setLoading(true);
            try {
                // Utilisation d'une URL relative
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ trafic: trafic })
                });

                if (!response.ok) {
                    throw new Error(`Erreur serveur : ${response.status}`);
                }

                const data = await response.json();
                const isCongested = data.prediction === 1;

                resultContainer.style.display = "block";
                if (isCongested) {
                    resultIcon.innerHTML = '<i class="fa-solid fa-traffic-light fa-beat-fade" style="color: #dc2626;"></i>';
                    resultText.innerHTML = "Embouteillage 🚦";
                    resultStatus.innerHTML = "Trafic dense – Ralentissements prévus";
                } else {
                    resultIcon.innerHTML = '<i class="fa-solid fa-road fa-fade" style="color: #16a34a;"></i>';
                    resultText.innerHTML = "Trafic fluide ✅";
                    resultStatus.innerHTML = "Circulation normale – Bonne route !";
                }
            } catch (error) {
                console.error("Erreur :", error);
                resultContainer.style.display = "block";
                resultIcon.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color: #dc2626;"></i>';
                resultText.innerHTML = "Erreur de prédiction";
                resultStatus.innerHTML = "Impossible de contacter le serveur. Vérifiez votre API Flask.";
            } finally {
                setLoading(false);
            }
        }

        predictBtn.addEventListener("click", predictTraffic);
        traficInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") predictTraffic();
        });
    </script>
</body>
</html>
